<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Screenshot Preview — Screenshot Master</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="preview.css">
</head>
<body>
  <div id="app">
    <!-- Top toolbar -->
    <header id="toolbar">
      <div class="toolbar-left">
        <img src="../icons/icon48.png" alt="" class="toolbar-logo">
        <span class="toolbar-title">Screenshot Master</span>
        <span id="mode-badge" class="mode-badge"></span>
      </div>
      <div class="toolbar-center" id="annotation-tools" style="display:none;">
        <button class="tool-btn" data-tool="rectangle" title="Rectangle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        </button>
        <button class="tool-btn" data-tool="arrow" title="Arrow">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="12 5 19 5 19 12"/></svg>
        </button>
        <button class="tool-btn" data-tool="text" title="Text">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/></svg>
        </button>
        <button class="tool-btn" data-tool="highlight" title="Highlight">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="8" rx="1" fill="rgba(250,204,21,0.3)"/></svg>
        </button>
        <button class="tool-btn" data-tool="pen" title="Freehand Draw">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
        </button>
        <div class="tool-separator"></div>
        <button class="tool-btn" data-tool="undo" title="Undo (Ctrl+Z)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
        <div class="tool-separator"></div>
        <input type="color" id="anno-color" value="#ef4444" class="color-picker" title="Annotation Color">
        <select id="anno-stroke" class="stroke-select" title="Stroke Width">
          <option value="2">Thin</option>
          <option value="3" selected>Medium</option>
          <option value="5">Thick</option>
        </select>
      </div>
      <div class="toolbar-right">
        <button id="btn-theme" class="action-btn secondary" title="Toggle Theme">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button id="btn-annotate" class="action-btn secondary" title="Toggle Annotations">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span>Annotate</span>
        </button>
        <div class="export-group">
          <select id="format-select" class="format-select">
            <option value="png">PNG</option>
            <option value="jpeg">JPEG</option>
          </select>
          <button id="btn-download" class="action-btn primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span>Download</span>
          </button>
        </div>
        <button id="btn-copy" class="action-btn secondary" title="Copy to Clipboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span>Copy</span>
        </button>
        <button id="btn-discard" class="action-btn danger" title="Discard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          <span>Discard</span>
        </button>
      </div>
    </header>

    <!-- Canvas area -->
    <main id="canvas-area">
      <div id="canvas-wrapper">
        <canvas id="screenshot-canvas"></canvas>
        <canvas id="annotation-canvas"></canvas>
      </div>
      <div id="loading-indicator">
        <div class="spinner"></div>
        <p>Assembling screenshot…</p>
      </div>
    </main>

    <!-- Custom Text Input Modal (replaces browser prompt) -->
    <div id="text-modal" class="modal-overlay hidden">
      <div class="modal-card">
        <h3>Add Text Annotation</h3>
        <input type="text" id="text-modal-input" class="modal-input" placeholder="Enter your text..." autocomplete="off" />
        <div class="modal-actions">
          <button id="text-modal-cancel" class="modal-btn cancel">Cancel</button>
          <button id="text-modal-ok" class="modal-btn ok">Add Text</button>
        </div>
      </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden"></div>
  </div>
  <script src="preview.js"></script>
</body>
</html>
