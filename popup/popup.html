<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot Master</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="logo-row">
        <img src="../icons/icon48.png" alt="Logo" class="logo-icon">
        <h1>Screenshot Master</h1>
        <button id="theme-toggle" class="theme-toggle" title="Toggle theme">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
      <p class="tagline">Capture any part of the web</p>
    </header>

    <div class="capture-buttons">
      <button id="btn-visible" class="capture-btn" data-mode="visible">
        <div class="btn-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-title">Visible Area</span>
          <span class="btn-desc">Capture current viewport</span>
        </div>
        <span class="shortcut-badge">Alt+Shift+V</span>
      </button>

      <button id="btn-fullpage" class="capture-btn" data-mode="fullpage">
        <div class="btn-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="2" width="16" height="20" rx="2"/>
            <line x1="8" y1="6" x2="16" y2="6"/>
            <line x1="8" y1="10" x2="16" y2="10"/>
            <line x1="8" y1="14" x2="12" y2="14"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-title">Full Page</span>
          <span class="btn-desc">Capture entire scrollable page</span>
        </div>
        <span class="shortcut-badge">Alt+Shift+F</span>
      </button>

      <button id="btn-selected" class="capture-btn" data-mode="selected">
        <div class="btn-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L2 6"/>
            <path d="M2 2h4v4"/>
            <path d="M18 2l4 4"/>
            <path d="M22 2h-4v4"/>
            <path d="M6 22l-4-4"/>
            <path d="M2 22h4v-4"/>
            <path d="M18 22l4-4"/>
            <path d="M22 22h-4v-4"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-title">Selected Area</span>
          <span class="btn-desc">Drag to select a region</span>
        </div>
        <span class="shortcut-badge">Alt+Shift+S</span>
      </button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
